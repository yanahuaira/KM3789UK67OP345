<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invitation</title>
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <style>
    :root { --w: 820px; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    .wrap { max-width: var(--w); margin: 0 auto; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    p { line-height: 1.35; }
    .q { font-weight: 600; margin-top: 14px; }
    .choices { margin: 10px 0 14px; padding-left: 18px; }
    .choices li { margin: 6px 0; }
    input[type="text"], textarea {
      width: 100%; box-sizing: border-box;
      padding: 10px; border: 1px solid #ccc; border-radius: 10px;
      font-size: 14px;
    }
    textarea { min-height: 90px; resize: vertical; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button {
      padding: 10px 14px; border: 1px solid #111; background: #111; color: #fff;
      border-radius: 10px; cursor: pointer; font-weight: 600;
    }
    button.secondary { background: #fff; color: #111; }
    .err { color: #b00020; margin-top: 10px; }
    pre {
      background: #0b0f14; color: #e6edf3;
      padding: 14px; border-radius: 12px; overflow: auto;
      white-space: pre-wrap; word-wrap: break-word;
    }
    .small { color: #555; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Hi</h1>
      <div id="app"></div>
    </div>
    <p class="small" style="max-width: var(--w); margin: 10px auto 0;">
      Note: This page is public if shared. Anyone with the link can view it.
    </p>
  </div>

<script>
  const state = {
    a1: null, a2: null, a3: null, a4: null, a5: null, a6: "", a7: ""
  };

  const choices1 = {
    A: "Absolutely, I will be happy to make time so we can get to know each other :D",
    B: "I am not interested in meeting a clever, loyal, commited, disciplined, slightly good looking latino"
  };

  const ch2 = { A:"Monday", B:"Tuesday", C:"Wednesday", D:"Thursday", E:"Friday", F:"Saturday", G:"Sunday" };
  const weekday = new Set(["A","B","C","D","E"]);
  const weekend = new Set(["F","G"]);

  const ch3 = { A:"Italian", B:"Sushi", C:"Middle-eastern", D:"Asian", E:"Other" };

  const ch4 = {
    A:"Easy morning walk followed by brunch",
    B:"Dinner/lunch and soccer match",
    C:"Strawberry picking and lunch/breakfast",
    D:"Try a new cafeteria or icecream (I have a few places in mind)"
  };

  const ch5 = {
    A:"I love NH and I want to stay here forever, lets stay close",
    B:"Take me out of here! lets go as far as possible."
  };

  const app = document.getElementById("app");

  function esc(s) {
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function renderIntro() {
    app.innerHTML = `
      <p>Hi Kimia!, since you are a very busy scientist</p>
      <p>I created this hoping I can meet you (but I understand if it is not a good time)</p>
      <div class="row">
        <button id="start">Start</button>
      </div>
    `;
    document.getElementById("start").onclick = renderQ1;
  }

  function renderMultipleChoice({title, prompt, choices, onValid, invalidMsg}) {
    const keys = Object.keys(choices);
    const items = keys.map(k => `<li><b>${esc(k)}:</b> ${esc(choices[k])}</li>`).join("");

    app.innerHTML = `
      <div class="q">${esc(prompt)}</div>
      <ul class="choices">${items}</ul>
      <div class="row">
        <input id="ans" type="text" inputmode="latin" autocomplete="off" placeholder="Type ${keys.join(" or ")}" />
        <button id="next">Next</button>
      </div>
      <div id="err" class="err" style="display:none;"></div>
      ${title ? `<p class="small">${esc(title)}</p>` : ""}
    `;

    const ans = document.getElementById("ans");
    const err = document.getElementById("err");

    function submit() {
      const v = ans.value.trim().toUpperCase();
      if (!choices[v]) {
        err.style.display = "block";
        err.textContent = invalidMsg || `Invalid choice. Please choose one of: ${keys.join(", ")}`;
        return;
      }
      err.style.display = "none";
      onValid(v);
    }

    document.getElementById("next").onclick = submit;
    ans.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
    ans.focus();
  }

  function renderQ1() {
    renderMultipleChoice({
      prompt: "Would you share some of your time with me?",
      choices: choices1,
      onValid: (v) => {
        if (v === "B") {
          // match your Python behavior: keep asking until A
          app.innerHTML = `
            <p class="err">It makes no sense to choose that answer, please try again :(. Answer A might be the correct answer ;)</p>
            <div class="row"><button id="try">Try again</button></div>
          `;
          document.getElementById("try").onclick = renderQ1;
          return;
        }
        state.a1 = v;
        renderQ2Intro();
      },
      invalidMsg: "Please select A or B"
    });
  }

  function renderQ2Intro() {
    app.innerHTML = `
      <p>Awesome! I really appreciate you making time.</p>
      <p>The next two weeks I am available after 5 pm any day during weekdays,<br/>and I can adapt to anytime during weekends</p>
      <div class="row"><button id="next">Next</button></div>
    `;
    document.getElementById("next").onclick = renderQ2;
  }

  function renderQ2() {
    renderMultipleChoice({
      prompt: "Which day would work best for you?",
      choices: ch2,
      onValid: (v) => {
        state.a2 = v;
        if (weekday.has(v)) renderQ3();
        else renderQ4();
      }
    });
  }

  function renderQ3() {
    app.innerHTML = `
      <p>Then we could have dinner. I am not sure if you have dietary restriction (maybe pork?).<br/>
      I though of some options.</p>
      <div class="row"><button id="next">Next</button></div>
    `;
    document.getElementById("next").onclick = () => {
      renderMultipleChoice({
        prompt: "Which would you prefer?",
        choices: ch3,
        onValid: (v) => { state.a3 = v; renderAfterMeal(); }
      });
    };
  }

  function renderQ4() {
    app.innerHTML = `
      <p>Great! Weekends give much more options. Here are some.</p>
      <div class="row"><button id="next">Next</button></div>
    `;
    document.getElementById("next").onclick = () => {
      renderMultipleChoice({
        prompt: "which would you prefer to do?",
        choices: ch4,
        onValid: (v) => { state.a4 = v; renderAfterMeal(); }
      });
    };
  }

  function renderAfterMeal() {
    app.innerHTML = `<p>That sounds good to me!</p><div class="row"><button id="next">Next</button></div>`;
    document.getElementById("next").onclick = renderQ5Intro;
  }

  function renderQ5Intro() {
    app.innerHTML = `
      <p>For any of these plans (except picking strawberries)<br/>
      there are options in NH. However, I am more than happy to pick you up<br/>
      if you are willing to go outside of NH. I think that will allow us to<br/>
      visit some new places.</p>
      <div class="row"><button id="next">Next</button></div>
    `;
    document.getElementById("next").onclick = renderQ5;
  }

  function renderQ5() {
    renderMultipleChoice({
      prompt: "Which sounds more like you?",
      choices: ch5,
      onValid: (v) => {
        state.a5 = v;
        if (v === "A") {
          app.innerHTML = `<p>This gives us a good idea of what to do.</p><div class="row"><button id="next">Next</button></div>`;
        } else {
          app.innerHTML = `<p>This gives us a good plan.<br/>Depending on your choices time might need to be re-adjusted depending of the activity</p><div class="row"><button id="next">Next</button></div>`;
        }
        document.getElementById("next").onclick = renderQ6;
      }
    });
  }

  function renderQ6() {
    app.innerHTML = `
      <div class="q">Type the time and address to meet/pick you up:</div>
      <input id="a6" type="text" autocomplete="off" placeholder="Time + Address" />
      <div class="q" style="margin-top:12px;">Anything else you would like to add?</div>
      <textarea id="a7" placeholder="Optional"></textarea>
      <div class="row" style="margin-top:12px;">
        <button id="finish">Finish</button>
        <button id="restart" class="secondary">Restart</button>
      </div>
      <div class="small" style="margin-top:10px;">
        Tip: nothing is sent automatically—this is just a page. You can copy the summary at the end.
      </div>
    `;

    document.getElementById("restart").onclick = () => {
      state.a1 = state.a2 = state.a3 = state.a4 = state.a5 = null;
      state.a6 = ""; state.a7 = "";
      renderIntro();
    };

    document.getElementById("finish").onclick = () => {
      state.a6 = document.getElementById("a6").value.trim();
      state.a7 = document.getElementById("a7").value.trim();
      renderSummary();
    };
  }

  function renderSummary() {
    const lines = [];
    lines.push("Here is a summary of your answers");
    lines.push("");
    lines.push(`Q1: ${state.a1} - ${choices1[state.a1]}`);
    lines.push(`Q2: ${state.a2} - ${ch2[state.a2]}`);
    if (state.a3) lines.push(`Q3: ${state.a3} - ${ch3[state.a3]}`);
    if (state.a4) lines.push(`Q4: ${state.a4} - ${ch4[state.a4]}`);
    lines.push(`Q5: ${state.a5} - ${ch5[state.a5]}`);
    lines.push(`Time (it can be in month if needed jaja) and Address: ${state.a6 || "(not provided)"}`);
    lines.push(`Additional info: ${state.a7 || "(not provided)"}`);
    lines.push("");
    lines.push("Would you be so kind to send me the summary please?");
    lines.push("If you don't have time, have to much going on your life right now, or");
    lines.push("you are not interested, I understand. I would really like the opportunity");
    lines.push("to know you Kimia :)");

    const text = lines.join("\n");

    app.innerHTML = `
      <pre id="summary">${esc(text)}</pre>
      <div class="row" style="margin-top:12px;">
        <button id="copy">Copy summary</button>
        <button id="restart" class="secondary">Restart</button>
      </div>
      <div id="copied" class="small" style="display:none; margin-top:10px;">Copied.</div>
    `;

    document.getElementById("restart").onclick = () => {
      state.a1 = state.a2 = state.a3 = state.a4 = state.a5 = null;
      state.a6 = ""; state.a7 = "";
      renderIntro();
    };

    document.getElementById("copy").onclick = async () => {
      try {
        await navigator.clipboard.writeText(text);
        const c = document.getElementById("copied");
        c.style.display = "block";
        c.textContent = "Copied.";
      } catch (e) {
        const c = document.getElementById("copied");
        c.style.display = "block";
        c.textContent = "Copy failed—select the text and copy manually.";
      }
    };
  }

  renderIntro();
</script>
</body>
</html>
